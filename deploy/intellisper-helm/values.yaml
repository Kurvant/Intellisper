# Default values for intellisper.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 1

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: ghcr.io/kurvant/intellisper
  # This sets the pull policy for images.
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

# This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# Container configuration
container:
  port: 80

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 80

# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
livenessProbe:
  httpGet:
    path: /api/v1/health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
readinessProbe:
  httpGet:
    path: /v1/health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5

# This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

persistence:
  enabled: true
  size: 2Gi
  mountPath: "/usr/src/app/cache"

volumes: []
volumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}

# ============================================================================
# Bitnami PostgreSQL subchart (optional)
# Set enabled=true to deploy a bundled PostgreSQL instance.
# When enabled, add these vars to intellisperEnvVariables and ensure they
# are present in intellisper-secrets:
#   IB_DB_TYPE=POSTGRES
#   IB_POSTGRES_HOST=<release-name>-postgresql
#   IB_POSTGRES_PORT=5432
#   IB_POSTGRES_DATABASE=intellisper
#   IB_POSTGRES_USERNAME=postgres
#   IB_POSTGRES_PASSWORD=<auto-generated or set auth.password below>
# Full subchart options: https://artifacthub.io/packages/helm/bitnami/postgresql
# ============================================================================
postgresql:
  enabled: false
  # auth:
  #   database: intellisper
  #   username: postgres
  #   password: ""        # leave empty to auto-generate
  # primary:
  #   persistence:
  #     enabled: true
  #     size: 8Gi

# ============================================================================
# Bitnami Redis subchart (optional)
# Set enabled=true to deploy a bundled Redis instance.
# When enabled, add these vars to intellisperEnvVariables and ensure they
# are present in intellisper-secrets:
#   IB_REDIS_TYPE=DEFAULT
#   IB_REDIS_HOST=<release-name>-redis-master
#   IB_REDIS_PORT=6379
#   IB_REDIS_PASSWORD=<auto-generated or set auth.password below>
# Full subchart options: https://artifacthub.io/packages/helm/bitnami/redis
# ============================================================================
redis:
  enabled: false
  # auth:
  #   enabled: true
  #   password: ""        # leave empty to auto-generate
  # master:
  #   persistence:
  #     enabled: true
  #     size: 4Gi

# Deployment-specific, non-sensitive env vars set as plain values.
# Use this for vars that differ per release (e.g. APP vs WORKER) and don't belong in the shared secret.
intellisperConfig:
  IB_CONTAINER_TYPE: ""

# Map of Kubernetes secret name → list of IB_* (and OTEL_*) env var names to inject.
# Each var name must exist as a key in the corresponding secret.
# Populate secrets with deploy/scripts/apply-secrets.sh --secret-name <name> before deploying.
intellisperEnvVariables:
  intellisper-config-secrets:
    - IB_EDITION
    - IB_EXECUTION_MODE
    - IB_ENVIRONMENT
    - IB_FRONTEND_URL
    - IB_ENABLE_FLOW_ON_PUBLISH
    - IB_CLIENT_REAL_IP_HEADER
    - IB_DB_TYPE
    - IB_ENGINE_EXECUTABLE_PATH
    - IB_PLATFORM_ID_FOR_DEDICATED_WORKER
    - IB_BLOCKS_SYNC_MODE
    - IB_BLOCKS_SOURCE
  intellisper-auth-secrets:
    - IB_ENCRYPTION_KEY
    - IB_JWT_SECRET
    - IB_API_KEY
    - IB_WORKER_TOKEN
    - IB_GOOGLE_CLIENT_ID
    - IB_GOOGLE_CLIENT_SECRET
    - IB_FIREBASE_HASH_PARAMETERS
  intellisper-queue-secrets:
    - IB_QUEUE_UI_ENABLED
    - IB_QUEUE_UI_USERNAME
    - IB_QUEUE_UI_PASSWORD
  intellisper-log-secrets:
    - IB_LOG_LEVEL
    - IB_LOG_PRETTY
    - IB_SENTRY_DSN
    - IB_HYPERDX_TOKEN
  intellisper-telemetry-secrets:
    - IB_TELEMETRY_ENABLED
    - IB_OTEL_ENABLED
    - IB_FEATUREBASE_API_KEY
  intellisper-limits-secrets:
    - IB_DEFAULT_CONCURRENT_JOBS_LIMIT
    - IB_PROJECT_RATE_LIMITER_ENABLED
    - IB_API_RATE_LIMIT_AUTHN_ENABLED
    - IB_MAX_FILE_SIZE_MB
    - IB_MAX_FLOW_RUN_LOG_SIZE_MB
    - IB_EXECUTION_DATA_RETENTION_DAYS
    - IB_WEBHOOK_TIMEOUT_SECONDS
  intellisper-cloudflare-secrets:
    - IB_CLOUDFLARE_API_BASE
    - IB_CLOUDFLARE_ZONE_ID
    - IB_CLOUDFLARE_API_TOKEN
  intellisper-integrations-secrets:
    - IB_APP_WEBHOOK_SECRETS
    - IB_SECRET_MANAGER_API_KEY
    - IB_OPENROUTER_PROVISION_KEY
    - IB_TEMPLATES_API_KEY
    - IB_TEMPLATE_MANAGER_API_KEY
  intellisper-db-secrets:
    - IB_POSTGRES_DATABASE
    - IB_POSTGRES_HOST
    - IB_POSTGRES_PORT
    - IB_POSTGRES_PASSWORD
    - IB_POSTGRES_USERNAME
    - IB_POSTGRES_USE_SSL
    - IB_POSTGRES_POOL_SIZE
    - IB_POSTGRES_SSL_CA
  intellisper-redis-secrets:
    - IB_REDIS_TYPE
    - IB_REDIS_HOST
    - IB_REDIS_PORT
    - IB_REDIS_PASSWORD
    - IB_REDIS_USE_SSL
    - IB_REDIS_USER
  intellisper-s3-secrets:
    - IB_FILE_STORAGE_LOCATION
    - IB_S3_BUCKET
    - IB_S3_REGION
    - IB_S3_ENDPOINT
    - IB_S3_USE_SIGNED_URLS
    - IB_S3_ACCESS_KEY_ID
    - IB_S3_SECRET_ACCESS_KEY
  intellisper-smtp-secrets:
    - IB_SMTP_HOST
    - IB_SMTP_PORT
    - IB_SMTP_USERNAME
    - IB_SMTP_PASSWORD
    - IB_SMTP_SENDER_EMAIL
    - IB_SMTP_SENDER_NAME
  intellisper-stripe-secrets:
    - IB_STRIPE_SECRET_KEY
    - IB_STRIPE_WEBHOOK_SECRET
  intellisper-otel-secrets:
    - OTEL_EXPORTER_OTLP_ENDPOINT
    - OTEL_EXPORTER_OTLP_HEADERS
