services:
  app:
    # Builds this repository's Dockerfile so `docker compose up` runs THIS fork.
    # (It previously pulled the upstream ghcr.io/activepieces image, which does not
    # understand the IB_* env vars.) The image is tagged so `worker` can reuse the
    # same build instead of building it a second time.
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/kurvant/intellisper:local
    container_name: intellisper-app
    restart: unless-stopped
    ports:
      - '8080:80'
    depends_on:
      - postgres
      - redis
    env_file: .env
    environment:
      - IB_CONTAINER_TYPE=APP
    volumes:
      - ./cache:/usr/src/app/cache
    networks:
      - intellisper
  worker:
    # Reuses the image built by `app` (same tag); does not rebuild.
    image: ghcr.io/kurvant/intellisper:local
    restart: unless-stopped
    depends_on:
      - app
    env_file: .env
    environment:
      - IB_CONTAINER_TYPE=WORKER
    deploy:
      replicas: 5
    volumes:
      - ./cache:/usr/src/app/cache
    networks:
      - intellisper
  postgres:
    image: 'pgvector/pgvector:0.8.0-pg14'
    container_name: postgres
    restart: unless-stopped
    env_file: .env
    environment:
      - 'POSTGRES_DB=${IB_POSTGRES_DATABASE}'
      - 'POSTGRES_PASSWORD=${IB_POSTGRES_PASSWORD}'
      - 'POSTGRES_USER=${IB_POSTGRES_USERNAME}'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - intellisper
  redis:
    image: 'redis:7.0.7'
    container_name: redis
    restart: unless-stopped
    volumes:
      - 'redis_data:/data'
    networks:
      - intellisper
volumes:
  postgres_data:
  redis_data:
networks:
  intellisper:
