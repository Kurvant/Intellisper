include-pre-releases: false
exclude-labels:
  - 'skip-changelog'
  - 'release'
  - 'pre-release'
categories:
  - title: "🔌 Pieces"
    labels:
      - "🧩 area/third-party-blocks"
      - "🧩 area/core-blocks"
  - title: "⛓️‍💥 Breaking Changes"
    labels:
      - "⛓️‍💥 breaking-change"
  - title: "✨ Exciting New Features"
    labels:
      - "🌟 feature"
  - title: "🐞 Bug Fixes"
    labels:
      - "🐛 bug"
  - title: "🎨 Enhancements & Polish"
    labels:
      - "✨ polishing"
  - title: "📚 Documentation"
    labels:
      - "📚 documentation"
  - title: "🧹 Maintenance"
    labels:
      - "🧹 clean up"

template: |

  $CHANGES

  ## Thanks ❤️
  $CONTRIBUTORS