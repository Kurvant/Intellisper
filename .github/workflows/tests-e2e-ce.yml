name: E2E Tests - Community Edition

on:
  workflow_call:
  workflow_dispatch:

env:
  IB_DEV_BLOCKS: store,webhook
  IB_BLOCKS_SYNC_MODE: NONE
  IB_BLOCKS_SOURCE: FILE
  IB_API_KEY: api-key
  IB_DB_TYPE: POSTGRES
  IB_POSTGRES_HOST: localhost
  IB_POSTGRES_PORT: 5432
  IB_POSTGRES_USERNAME: postgres
  IB_POSTGRES_PASSWORD: postgres
  IB_POSTGRES_DATABASE: activepieces
  IB_POSTGRES_USE_SSL: "false"
  IB_REDIS_URL: redis://localhost:6379
  IB_QUEUE_MODE: REDIS
  IB_FRONTEND_URL: http://localhost:4200
  IB_WEBHOOK_TIMEOUT_SECONDS: "30"
  IB_TRIGGER_DEFAULT_POLL_INTERVAL: "1"
  IB_EXECUTION_MODE: UNSANDBOXED
  IB_TELEMETRY_ENABLED: "false"
  IB_ENVIRONMENT: test
  IB_JWT_SECRET: "secret"
  IB_ENCRYPTION_KEY: "fdbe51af3678563560972e4a912aee6d"

jobs:
  test-e2e-ce:
    runs-on: depot-ubuntu-24.04-4
    timeout-minutes: 30
    
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: activepieces
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 2

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: bun-

      - name: Setup nodejs
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        
      - name: Run E2E tests
        run: |
          npm run test:e2e
        env:
          CI: true
          
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: playwright-report-ce
          path: packages/tests-e2e/playwright-report/
          retention-days: 10
          
      - name: Upload Test Results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: test-results-ce
          path: packages/tests-e2e/test-results/
          retention-days: 10
